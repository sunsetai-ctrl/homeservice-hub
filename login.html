<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | HomeService Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-4">
        <div class="w-12 h-12 bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <div>
          <span class="font-bold text-2xl text-white">HomeService</span>
          <span class="font-bold text-2xl text-orange-500">Hub</span>
        </div>
      </div>
      <p class="text-slate-400">Sign in to your account</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <!-- Tab Switcher -->
      <div class="flex mb-6 bg-slate-100 rounded-lg p-1">
        <button type="button" id="loginTab" class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition bg-white shadow text-slate-800">
          Sign In
        </button>
        <button type="button" id="signupTab" class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition text-slate-500">
          Sign Up
        </button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" id="loginEmail" required
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition"
            placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" id="loginPassword" required
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition"
            placeholder="••••••••">
        </div>
        <button type="submit" id="loginBtn"
          class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white py-3 rounded-lg font-semibold hover:from-orange-600 hover:to-orange-700 transition flex items-center justify-center gap-2">
          Sign In
        </button>
      </form>

      <!-- Signup Form (hidden by default) -->
      <form id="signupForm" class="space-y-4 hidden">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
          <input type="text" id="signupName" required
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition"
            placeholder="John Doe">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" id="signupEmail" required
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition"
            placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" id="signupPassword" required minlength="6"
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition"
            placeholder="••••••••">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Company Name</label>
          <input type="text" id="signupCompany" required
            class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition"
            placeholder="Your Company Name">
        </div>
        <button type="submit" id="signupBtn"
          class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white py-3 rounded-lg font-semibold hover:from-orange-600 hover:to-orange-700 transition flex items-center justify-center gap-2">
          Create Account
        </button>
      </form>

      <!-- Error/Success Messages -->
      <div id="message" class="mt-4 p-3 rounded-lg text-sm hidden"></div>

      <!-- Forgot Password -->
      <div class="mt-6 text-center">
        <button type="button" id="forgotBtn" class="text-sm text-orange-600 hover:text-orange-700 bg-transparent border-none cursor-pointer">
          Forgot your password?
        </button>
      </div>
    </div>

    <!-- Demo Login -->
    <div class="mt-6 text-center">
      <p class="text-slate-400 text-sm mb-3">Demo Accounts:</p>
      <div class="flex gap-2 justify-center">
        <button type="button" id="proDemoBtn" class="px-4 py-2 bg-slate-700 text-white rounded-lg text-sm hover:bg-slate-600 transition cursor-pointer">
          Pro Demo
        </button>
        <button type="button" id="adminDemoBtn" class="px-4 py-2 bg-slate-700 text-white rounded-lg text-sm hover:bg-slate-600 transition cursor-pointer">
          Admin Demo
        </button>
      </div>
    </div>

    <!-- Back to Home -->
    <div class="mt-6 text-center">
      <a href="intake.html" class="text-slate-400 hover:text-white text-sm flex items-center justify-center gap-2">
        ← Back to Home
      </a>
    </div>
  </div>

  <script>
    // Supabase config
    const SUPABASE_URL = 'https://amggehmbxidqxzjimmzz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtZ2dlaG1ieGlkcXh6amltbXp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjUwODksImV4cCI6MjA4OTkwMTA4OX0.3vO8gqkb4m71tW0ZiXX_X9npzYUoFJ_2gT8sT1-B1rs';
    
    let supabaseClient = null;
    
    // Wait for everything to load
    window.addEventListener('load', function() {
      console.log('Page loaded, initializing...');
      
      // Initialize Supabase
      try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log('Supabase initialized');
      } catch (e) {
        console.error('Supabase init error:', e);
      }
      
      // Initialize Lucide icons
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }
      
      // ========== DEMO BUTTONS ==========
      document.getElementById('proDemoBtn').addEventListener('click', function(e) {
        e.preventDefault();
        console.log('Pro Demo clicked');
        localStorage.setItem('demoMode', 'pro');
        localStorage.setItem('proCompanyId', '11111111-1111-1111-1111-111111111111');
        window.location.href = 'pro-dashboard.html';
      });
      
      document.getElementById('adminDemoBtn').addEventListener('click', function(e) {
        e.preventDefault();
        console.log('Admin Demo clicked');
        localStorage.setItem('demoMode', 'admin');
        localStorage.setItem('proCompanyId', '11111111-1111-1111-1111-111111111111');
        window.location.href = 'admin.html';
      });
      
      // ========== TAB SWITCHING ==========
      document.getElementById('loginTab').addEventListener('click', function(e) {
        e.preventDefault();
        console.log('Login tab clicked');
        showLoginTab();
      });
      
      document.getElementById('signupTab').addEventListener('click', function(e) {
        e.preventDefault();
        console.log('Signup tab clicked');
        showSignupTab();
      });
      
      // ========== FORGOT PASSWORD ==========
      document.getElementById('forgotBtn').addEventListener('click', function(e) {
        e.preventDefault();
        console.log('Forgot password clicked');
        handleForgotPassword();
      });
      
      // ========== LOGIN FORM ==========
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        console.log('Login form submitted');
        handleLogin();
      });
      
      // ========== SIGNUP FORM ==========
      document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        console.log('Signup form submitted');
        handleSignup();
      });
      
      // Check if already logged in
      checkExistingSession();
      
      console.log('All event handlers attached');
    });
    
    // Tab functions
    function showLoginTab() {
      document.getElementById('loginTab').classList.add('bg-white', 'shadow', 'text-slate-800');
      document.getElementById('loginTab').classList.remove('text-slate-500');
      document.getElementById('signupTab').classList.remove('bg-white', 'shadow', 'text-slate-800');
      document.getElementById('signupTab').classList.add('text-slate-500');
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('signupForm').classList.add('hidden');
      hideMessage();
    }
    
    function showSignupTab() {
      document.getElementById('signupTab').classList.add('bg-white', 'shadow', 'text-slate-800');
      document.getElementById('signupTab').classList.remove('text-slate-500');
      document.getElementById('loginTab').classList.remove('bg-white', 'shadow', 'text-slate-800');
      document.getElementById('loginTab').classList.add('text-slate-500');
      document.getElementById('signupForm').classList.remove('hidden');
      document.getElementById('loginForm').classList.add('hidden');
      hideMessage();
    }
    
    // Message functions
    function showMessage(text, isError) {
      var msg = document.getElementById('message');
      msg.textContent = text;
      msg.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
      if (isError) {
        msg.classList.add('bg-red-100', 'text-red-700');
      } else {
        msg.classList.add('bg-green-100', 'text-green-700');
      }
    }
    
    function hideMessage() {
      document.getElementById('message').classList.add('hidden');
    }
    
    // Login handler
    async function handleLogin() {
      var email = document.getElementById('loginEmail').value;
      var password = document.getElementById('loginPassword').value;
      var btn = document.getElementById('loginBtn');
      
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      
      try {
        var result = await supabaseClient.auth.signInWithPassword({ email: email, password: password });
        
        if (result.error) {
          throw result.error;
        }
        
        showMessage('Login successful! Redirecting...', false);
        setTimeout(function() {
          redirectBasedOnRole();
        }, 1000);
        
      } catch (error) {
        showMessage(error.message, true);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
    
    // Signup handler
    async function handleSignup() {
      var name = document.getElementById('signupName').value;
      var email = document.getElementById('signupEmail').value;
      var password = document.getElementById('signupPassword').value;
      var companyName = document.getElementById('signupCompany').value;
      var btn = document.getElementById('signupBtn');
      
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      
      try {
        // Create auth user
        var authResult = await supabaseClient.auth.signUp({
          email: email,
          password: password,
          options: { data: { full_name: name } }
        });
        
        if (authResult.error) throw authResult.error;
        
        // Create company
        var companyResult = await supabaseClient
          .from('companies')
          .insert([{ name: companyName }])
          .select()
          .single();
        
        if (companyResult.error) throw companyResult.error;
        
        // Create user record
        var userResult = await supabaseClient
          .from('users')
          .insert([{
            auth_id: authResult.data.user.id,
            email: email,
            full_name: name,
            company_id: companyResult.data.id,
            role: 'pro'
          }]);
        
        if (userResult.error) throw userResult.error;
        
        showMessage('Account created! Check your email to confirm, then login.', false);
        showLoginTab();
        
      } catch (error) {
        showMessage(error.message, true);
      }
      
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
    
    // Forgot password handler
    async function handleForgotPassword() {
      var email = document.getElementById('loginEmail').value;
      
      if (!email) {
        showMessage('Please enter your email first', true);
        return;
      }
      
      try {
        var result = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/login.html'
        });
        
        if (result.error) {
          showMessage(result.error.message, true);
        } else {
          showMessage('Password reset email sent! Check your inbox.', false);
        }
      } catch (error) {
        showMessage(error.message, true);
      }
    }
    
    // Check existing session
    async function checkExistingSession() {
      try {
        var result = await supabaseClient.auth.getSession();
        if (result.data.session) {
          redirectBasedOnRole();
        }
      } catch (e) {
        console.log('No existing session');
      }
    }
    
    // Redirect based on role
    async function redirectBasedOnRole() {
      try {
        var userResult = await supabaseClient.auth.getUser();
        if (!userResult.data.user) return;
        
        var userData = await supabaseClient
          .from('users')
          .select('role, company_id')
          .eq('auth_id', userResult.data.user.id)
          .single();
        
        if (userData.data) {
          localStorage.setItem('proCompanyId', userData.data.company_id);
          localStorage.removeItem('demoMode');
          
          if (userData.data.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'pro-dashboard.html';
          }
        } else {
          window.location.href = 'pro-dashboard.html';
        }
      } catch (e) {
        console.error('Redirect error:', e);
        window.location.href = 'pro-dashboard.html';
      }
    }
  </script>
</body>
</html>
